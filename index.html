<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRUD-JOD — Carte de Membre</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Barlow+Condensed:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--noir:#111;--rouge:#cc0000;--blanc:#fff;--gris-clair:#f5f5f5;--gris-mid:#e0e0e0;--muted:#777;--shadow:0 8px 40px rgba(0,0,0,0.22);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1a1a;font-family:'Barlow Condensed',sans-serif;min-height:100vh;}
header{background:#111;padding:36px 20px 28px;text-align:center;border-bottom:3px solid var(--rouge);}
.horse-wrap{width:130px;height:130px;background:white;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;border:3px solid var(--rouge);box-shadow:0 0 0 6px rgba(204,0,0,.15),0 8px 30px rgba(0,0,0,.5);margin-bottom:18px;overflow:hidden;padding:10px;}
.horse-wrap svg{width:110px;height:110px;}
.party-name{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,6vw,38px);font-weight:700;color:var(--blanc);letter-spacing:.06em;}
.red-bar{width:70px;height:3px;background:var(--rouge);margin:8px auto;}
.party-ar{font-family:'Noto Sans Arabic',sans-serif;font-size:14px;color:#aaa;margin-top:4px;}
.party-sub{font-size:10px;color:#666;letter-spacing:.22em;text-transform:uppercase;margin-top:5px;}
.lang-bar{display:flex;gap:8px;justify-content:center;margin-top:18px;}
.lang-btn{padding:5px 16px;border-radius:20px;border:1px solid #444;background:transparent;color:#888;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:.1em;cursor:pointer;transition:all .2s;}
.lang-btn.active,.lang-btn:hover{background:var(--rouge);color:white;border-color:var(--rouge);}
main{max-width:780px;margin:0 auto;padding:28px 16px 60px;}
.gate-card{background:var(--blanc);border-radius:14px;padding:40px 32px;text-align:center;box-shadow:var(--shadow);border-top:4px solid var(--rouge);animation:fadeUp .5s ease both;}
.gate-ico{font-size:48px;margin-bottom:14px;}
.gate-title{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--noir);margin-bottom:8px;font-weight:700;}
.gate-sub{font-size:14px;color:var(--muted);margin-bottom:6px;line-height:1.6;}
.gate-ar{font-family:'Noto Sans Arabic',sans-serif;font-size:13px;color:var(--muted);margin-bottom:26px;}
.code-label{font-size:13px;font-weight:700;color:var(--noir);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;}
.code-row{display:flex;gap:9px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;}
.cbox{width:48px;height:58px;border-radius:8px;border:2px solid var(--gris-mid);background:var(--gris-clair);color:var(--noir);font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;text-align:center;outline:none;transition:all .2s;text-transform:uppercase;}
.cbox:focus{border-color:var(--rouge);background:white;box-shadow:0 0 0 3px rgba(204,0,0,.1);}
.cbox.filled{border-color:var(--noir);color:var(--rouge);}
.btn-verify{background:var(--noir);border:none;border-radius:8px;padding:13px 32px;color:white;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;width:100%;}
.btn-verify:hover{background:var(--rouge);}
.btn-verify:disabled{opacity:.45;cursor:not-allowed;}
.msg-area{min-height:32px;margin-top:12px;font-size:13px;}
.msg-err{color:var(--rouge);}.msg-ok{color:#222;}.msg-info{color:var(--muted);}
.steps{display:flex;align-items:center;justify-content:center;margin-bottom:22px;}
.step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;max-width:110px;}
.step-c{width:34px;height:34px;border-radius:50%;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#aaa;background:white;transition:all .3s;}
.step.active .step-c{border-color:var(--rouge);color:var(--rouge);box-shadow:0 0 0 3px rgba(204,0,0,.12);}
.step.done .step-c{border-color:var(--noir);color:white;background:var(--noir);}
.step-l{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#aaa;text-align:center;}
.step.active .step-l{color:var(--rouge);font-weight:600;}
.step-line{flex:1;height:2px;background:#ddd;max-width:40px;margin-bottom:18px;}
.card{background:white;border-radius:12px;padding:28px;box-shadow:var(--shadow);border-top:4px solid var(--rouge);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.ff{grid-column:1/-1;}
.field{display:flex;flex-direction:column;gap:4px;}
label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--noir);font-weight:700;}
input,select{background:var(--gris-clair);border:1px solid var(--gris-mid);border-radius:6px;padding:10px 12px;font-family:'Barlow Condensed',sans-serif;font-size:15px;width:100%;}
.photo-zone{border:2px dashed var(--gris-mid);border-radius:10px;padding:20px;text-align:center;cursor:pointer;position:relative;}
#photo-prev{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--noir);margin:0 auto;display:none;}
.pay-section{background:var(--gris-clair);border-radius:10px;padding:20px;margin-bottom:20px;border-left:4px solid var(--rouge);}
.pay-amount-big{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:700;color:var(--noir);}
.btn-primary{background:var(--noir);border:none;border-radius:8px;padding:13px 26px;color:white;font-weight:700;cursor:pointer;width:100%;margin-top:18px;}
.btn-primary:hover{background:var(--rouge);}
#mem-card{width:100%;background:white;border:1px solid #bbb;border-radius:6px;padding:20px;position:relative;box-shadow:0 8px 30px rgba(0,0,0,.2);}
.mc-rouge-top{position:absolute;top:0;left:0;right:0;height:5px;background:var(--rouge);}
.mc-body{display:flex;gap:15px;margin-top:20px;}
.mc-fields{flex:1;}
.mc-row{display:flex;justify-content:space-between;border-bottom:1px dotted #ccc;padding:5px 0;font-size:11px;}
.mc-photo-box{width:80px;height:100px;border:1px solid #999;background:#eee;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.mc-photo-box img{width:100%;height:100%;object-fit:cover;}
.screen{display:none;}.screen.active{display:block;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--noir);color:white;padding:12px 20px;border-radius:8px;opacity:0;transition:0.3s;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <div class="horse-wrap">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <path fill="#111" d="M155,38c-4-3-9-3-13,1l-6,6c-4-6-11-10-17-10c-5,0-9,2-11,5l-17-4c-7-2-13,0-17,5c-4,4-4,10-2,15l4,8c-6,4-10,11-10,19c0,7,3,13,7,17l-10,32c-2,6,0,12,4,14c3,2,6,1,9-1l13-21l4,6l-6,19c-2,6,0,11,4,13c3,2,7,1,9-2l10-19l6,2l2,17c0,5,4,8,8,8c5,0,8-4,8-8l-2-25c4-2,8-6,10-11l17,6c6,2,12,0,14-6c2-5,0-10-4-13l-13-6c2-4,2-8,0-12l8-10c6-6,6-15,4-21C161,43,158,40,155,38z"/>
    </svg>
  </div>
  <div class="party-name">FRUD — جود</div>
  <div class="red-bar"></div>
  <div class="party-ar">الجبهة الجمهورية للوحدة والديمقراطية</div>
  <div class="lang-bar">
    <button class="lang-btn active">Français</button>
    <button class="lang-btn">العربية</button>
  </div>
</header>

<main>
  <!-- GATE -->
  <div id="gate">
    <div class="gate-card">
      <div class="gate-ico">🔐</div>
      <div class="gate-title">Accès réservé</div>
      <div class="code-row">
        <input class="cbox" id="c0" maxlength="1" oninput="ci(0)">
        <input class="cbox" id="c1" maxlength="1" oninput="ci(1)">
        <input class="cbox" id="c2" maxlength="1" oninput="ci(2)">
        <input class="cbox" id="c3" maxlength="1" oninput="ci(3)">
        <input class="cbox" id="c4" maxlength="1" oninput="ci(4)">
        <input class="cbox" id="c5" maxlength="1" oninput="ci(5)">
      </div>
      <button class="btn-verify" id="btn-v" onclick="verifyCode()">Vérifier</button>
      <div class="msg-area" id="msg"></div>
    </div>
  </div>

  <!-- FORM AREA -->
  <div id="form-area" style="display:none">
    <div class="steps">
      <div class="step active" id="st1"><div class="step-c">1</div><div class="step-l">Identité</div></div>
      <div class="step-line"></div>
      <div class="step" id="st2"><div class="step-c">2</div><div class="step-l">Paiement</div></div>
      <div class="step-line"></div>
      <div class="step" id="st3"><div class="step-c">3</div><div class="step-l">Carte</div></div>
    </div>

    <!-- ÉTAPE 1: IDENTITÉ -->
    <div class="screen active" id="sc1">
      <div class="card">
        <div class="form-grid">
          <div class="field ff">
            <label>Photo</label>
            <div class="photo-zone">
              <input type="file" id="ph-in" accept="image/*" onchange="prevPh(event)" style="position:absolute;inset:0;opacity:0;cursor:pointer;">
              <img id="photo-prev" src="">
              <div id="ph-txt">Cliquer pour ajouter une photo</div>
            </div>
          </div>
          <div class="field"><label>Nom</label><input type="text" id="nom" placeholder="Nom"></div>
          <div class="field"><label>Prénom</label><input type="text" id="pre" placeholder="Prénom"></div>
          <div class="field ff"><label>N° CIN (NNI)</label><input type="text" id="nni" maxlength="10" placeholder="10 chiffres"></div>
          <div class="field ff"><label>Wilaya</label>
            <select id="wilaya">
              <option value="">Sélectionner...</option>
              <option>Nouakchott Ouest</option>
              <option>Nouakchott Nord</option>
              <option>Nouakchott Sud</option>
              <option>Trarza</option>
            </select>
          </div>
        </div>
        <button class="btn-primary" onclick="setStep(2)">Suivant →</button>
      </div>
    </div>

    <!-- ÉTAPE 2: PAIEMENT -->
    <div class="screen" id="sc2">
      <div class="card">
        <div class="pay-section">
          <div class="pay-amount-big">50 UM</div>
          <p>Frais d'adhésion par mobile money.</p>
        </div>
        <div class="field">
          <label><input type="checkbox" id="pay-check"> Je confirme avoir réglé les 50 UM</label>
        </div>
        <button class="btn-primary" onclick="submitForm()">Valider l'inscription ✓</button>
      </div>
    </div>

    <!-- ÉTAPE 3: CARTE -->
    <div class="screen" id="sc3">
      <div id="mem-card">
        <div class="mc-rouge-top"></div>
        <div style="text-align:center;">
          <strong style="font-size:14px;">FRUD - CARTE DE MEMBRE</strong>
        </div>
        <div class="mc-body">
          <div class="mc-fields">
            <div class="mc-row"><span>Nom :</span> <b id="mc-name"></b></div>
            <div class="mc-row"><span>Wilaya :</span> <b id="mc-wilaya"></b></div>
            <div class="mc-row"><span>N° CIN :</span> <b id="mc-cin"></b></div>
          </div>
          <div class="mc-photo-box" id="mc-photo-box">👤</div>
        </div>
        <div id="mc-qr" style="margin-top:15px; display:flex; justify-content:center;"></div>
      </div>
      <button class="btn-primary" onclick="window.print()">Imprimer la carte</button>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://sndamkcjaexxmvimobbg.supabase.co';
const SUPA_KEY='sb_publishable_c9yp6ZBGQy943ti3ZY9Z3A_SZHa6YiJ';
let photoData = null;

async function supa(method,path,body){
  const res=await fetch(SUPA_URL+path,{
    method,
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'},
    body:body?JSON.stringify(body):undefined
  });
  return res.json();
}

function ci(i){
  const el=document.getElementById('c'+i);
  if(el.value && i<5) document.getElementById('c'+(i+1)).focus();
}

async function verifyCode(){
  const code = [0,1,2,3,4,5].map(i=>document.getElementById('c'+i).value).join('');
  if(code.length < 6) return;
  
  document.getElementById('msg').innerHTML = "Vérification...";
  try {
    const data = await supa('GET', `/rest/v1/codes?code=eq.${code}&select=*`);
    if(data && data.length > 0 && !data[0].used) {
      document.getElementById('gate').style.display='none';
      document.getElementById('form-area').style.display='block';
    } else {
      document.getElementById('msg').innerHTML = "Code invalide ou déjà utilisé.";
    }
  } catch(e) { document.getElementById('msg').innerHTML = "Erreur de connexion."; }
}

function prevPh(e) {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (event) => {
      photoData = event.target.result;
      document.getElementById('photo-prev').src = photoData;
      document.getElementById('photo-prev').style.display = 'block';
      document.getElementById('ph-txt').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }
}

function setStep(s) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById('sc' + s).classList.add('active');
  document.querySelectorAll('.step').forEach((el, idx) => {
    el.className = (idx + 1 === s) ? 'step active' : (idx + 1 < s ? 'step done' : 'step');
  });
}

function submitForm() {
  if(!document.getElementById('pay-check').checked) return alert("Cochez la confirmation de paiement.");
  
  document.getElementById('mc-name').innerText = document.getElementById('pre').value + " " + document.getElementById('nom').value;
  document.getElementById('mc-wilaya').innerText = document.getElementById('wilaya').value;
  document.getElementById('mc-cin').innerText = document.getElementById('nni').value;
  if(photoData) document.getElementById('mc-photo-box').innerHTML = `<img src="${photoData}">`;
  
  new QRCode(document.getElementById("mc-qr"), { text: document.getElementById('nni').value, width: 60, height: 60 });
  setStep(3);
}
</script>
</body>
</html>
